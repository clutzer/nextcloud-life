# Nextcloud App Desired State — File Sync + Observability Focus
# Core file sync + admin/telemetry tools when using web UI

# === Core File Sync (Do NOT disable) ===
files = enable
files_sharing = enable
files_trashbin = enable
files_versions = enable
files_pdfviewer = enable
files_rightclick = enable

# === Core / Protected System Apps (use ignore) ===
dav = ignore
oauth2 = ignore
theming = ignore
viewer = ignore
workflowengine = ignore
provisioning_api = ignore
settings = ignore

# === Observability & Admin Tools ===
serverinfo = enable
logreader = enable
support = enable
updatenotification = enable
survey_client = enable
nextcloud_announcements = enable

# === Useful lightweight extras ===
systemtags = enable
twofactor_backupcodes = enable

# === Federation (cannot be reliably disabled — set to ignore) ===
federation = ignore
cloud_federation_api = ignore
federatedfilesharing = ignore
lookup_server_connector = ignore

# === Disable everything else (saves RAM and reduces noise) ===
activity = disable
bruteforcesettings = disable
comments = disable
contactsinteraction = disable
dashboard = disable
firstrunwizard = disable
notifications = disable
password_policy = disable
privacy = disable
recommendations = disable
related_resources = disable
sharebymail = disable
text = disable
user_status = disable
weather_status = disable
